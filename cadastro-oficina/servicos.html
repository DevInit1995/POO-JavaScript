 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/cadastro-oficina/css/style.css">
    <title>Serviços e peças</title>
</head>

<body>
    <div class="form-container">
        <div class="form-step active">
            <h1>Informações do serviço</h1>

            <label for="id">Número da O.S (ID):</label>
            <input type="number" id="id">

            <label for="descricao">Descrição do serviço:</label>
                <textarea id="descricao" cols="50" 
                    rows="8" placeholder="Ex.: Troca de óleo, troca de pastilha"></textarea>

            <label for="tempoEstimado">Tempo estimado:</label>
            <input type="time" id="tempoEstimado">

            <label for="preco">Preço da mão de obra:</label>
            <input type="number" id="preco" placeholder="1800">

            <details>
                <summary>Categoria:</summary>
                <p>Selecione uma opção abaixo:</p>
                <select name="categoria" id="categoria">
                    <option value="">Selecione a categoria:</option>
                    <option value="mecanica">Mecânica</option>
                    <option value="revisao">Revisão</option>
                </select>
            </details>

           <div class="buttons">
                <button type="button" class="btnAvancar">Avançar</button>
           </div>
        </div>

        <div class="form-step">
            <h3>Informações de cada peça</h3>

            <label for="id">ID:</label>
            <input type="number" id="id" placeholder="Ex.: 0000000">

            <label for="nome">Nome da peça:</label>
            <input type="text" id="nome" placeholder="Ex.: Amortecedor">

            <label for="marca">Marca:</label>
            <input type="text" id="marca" placeholder="Ex.: Axios">

            <label for="codigoInterno">Código Interno:</label>
            <input type="number" id="codigoInterno" placeholder="Ex.: 000000000">

            <label for="quantidadeEstoque">Quantidade estoque:</label>
            <input type="number" id="quantidadeEstoque" placeholder="Ex.: 20 un">

            <label for="precoUnitario">Preço unitária:</label>
            <input type="number" id="precoUnitario" placeholder="Ex.: 80.00">

            <label for="fonecedor">Fornecedor(opcional):</label>
            <input type="text" id="fornecedor" placeholder="Ex.: Anc">

            <div class="buttons">
                <button type="button" class="btnVoltar">Voltar</button>
                <button type="button" class="btnConcluir">Concluir</button>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/cadastro-oficina/js/carrossel.js"></script>
</body>
</html>
