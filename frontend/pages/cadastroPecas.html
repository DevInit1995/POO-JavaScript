<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Peças</title>
    <link rel="stylesheet" href="/cadastro-oficina/frontend/css/style.css">
</head>
<body>
    <div class="form-container">
            <div class="form-step active">
                <h1>Cadastro de Peças</h1>
                <h3>Descrição do produto</h3>

                <label for="id">Id:</label>
                <input type="number" id="id">

                <label for="nomeProduto">Nome do Produto:</label>
                <input type="text" id="nomeProduto" placeholder="Ex.: Filtro de óleo, Pastilha de freio">

                <label for="codigoInterno">Código interno:</label>
                <input type="text" id="codigoInterno" placeholder="Ex.: XXX-XXX-XXX-XX">

                <label for="categoria">Categoria:</label>
                <input type="text" id="categoria" placeholder="Ex.:Motor, Freios, Suspensão, Elétrica">

                <label for="marca">Marca:</label>
                <input type="text" id="marca" placeholder= "Ex.: Bosch, Cofap, Monroe">

                <label for="quantidadeEstoque">Quantidade Estoque:</label>
                <input type="text" id="quantidadeEstoque" placeholder="Ex.: 20 un">
                        
                <label for="precoCusto">Preço Custo:</label>
                <input type="text" id="precoCusto" placeholder="Ex.: R$ 50,00">   
                       
                <label for="precoVenda">Preço de venda:</label>
                <input type="text" id="precoVenda" placeholder="Ex.: R$ 50,00">

                <label for="fornecedor">Fornecedor:</label>
                <input type="text" id="fornecedor">

                <div id="status">
                    <label for="status">Status:</label>

                    <label for="ativo">Ativo:</label>
                    <input type="radio" name="ativo" id="ativo" value="Ativo">
                    <label for="inativo">Inativo:</label>
                    <input type="radio" name="inativo" id="inativo" value="Inativo">
                </div>

                <div class="buttons">
                    <button type="button" class="btnAvancar">Avançar</button>
                </div>
            </div>

            <div class="form-step">
                <h3>Estoque e Controle</h3>
                
                <label for="unidadeMedida">Unidade Medida:</label>
                <input type="text" id="unidadeMedida" placeholder="Ex.: Unidade, par, litro, kit">

                <label for="estoqueMinimo">Estoque Minímo:</label>
                <input type="text" id="estoqueMinimo" placeholder="Ex.: 15">

                <label for="localizacaoEstoque">Localização Estoque:</label>
                <input type="text" id="localizacaoEstoque" placeholder="Ex.: Prateleira A2, Gaveta 5">

                <label for="codigoFabricante">Código do fabricante:</label>
                <input type="text" id="codigoFabricante">

                <label for="aplicacao">Aplicação:</label>
                <input type="text" id="aplicacao" placeholder="Ex.: Gol 1.6 2010–2014">

                <label for="observacoes">Observações:</label>

                <textarea id="observacoes" cols="50" 
                    rows="8" placeholder="Descreva as observações!">
                </textarea>

                <div class="buttons">
                    <button type="button" class="btnVoltar">Voltar</button>
                    <button type="button" class="btnAvancar">Avançar</button>
                </div>
            </div>

            <div class="form-step">
                <label for="dataCadastro">Data Cadastro:</label>
                <input type="date" id="dataCadastro">

                <label for="ultimaAtualizacao">Última atualização:</label>
                <input type="date" id="ultimaAtualizacao">

                <label for="imgProduto">Imagem do produto:</label>
                <input type="image" id="imgProduto">

                <label for="codigoBarras">Código de barras:</label>
                <input type="text" id="codigoBarras">

                <label for="garantia">Garantia (meses):</label>
                <input type="text" id="garantia" placeholder="Ex.: 6">

                <label for="pesoVolume">Peso / Volume:</label>
                <input type="text" id="pesoVolume">

                <div class="buttons">
                    <button type="button" class="btnVoltar">Voltar</button>
                    <button type="button" class="btnAvancar">Avançar</button>
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="/cadastro-oficina/frontend/js/cadastroPecas.js"></script>
</body>
</html>
